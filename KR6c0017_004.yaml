body:
  text: 三寶尊菩薩造大域龍菩薩造本論西天譯經三藏朝奉大夫試光祿卿傳法大師賜紫沙門臣施護等奉詔譯復次此中顯示世尊所説正理如彼頌言如理言淨性亦然不可得性無性違等種種性定見此云如理言等者謂隨染分別以智對治諸有散亂是故如理之言世尊於般若波羅蜜多中正説頌言淨性者謂即如理自性清淨光明而能對治彼不清淨諸有散亂頌言亦然者即聚集義此一性等性所有聚集量不可得如理之言即如量義體即無二之智彼能對治此為決定問此復何等量不可得答此説比量不可得故所有自受非他相所增如樂等自受若言論安立即如實智自性所得相違他相有增自受不成對治量故此中非彼所知青等相一多性異有分別故是故決定觀察自受成就所行悲愍即非外門所照現性不為他相有增動亂何以故所有青等諸相勝義諦中無實性故此唯有智如實了知此無過失若於外事如其自受以如是義有所安立即不如義此有過失而非決定見邊成就何以故以樂等受於外諸處無有性故亦非異處有所伺察此中樂等受即樂等自性受非樂等相受此等所説即離能取所取二相之智此非別異所有問若今無彼能取所取識者云何於後有彼識性答此中但離能取所取相彼後識相雖有而非語言表示彼有之性真實表示如理和合是故此説彼一切識若比量智而非此中和合所成何以故以彼無二之相非有二相領受所行若有二相彼量不成以彼二相而為對礙如執兔角豈非過失何以故非能取聲中説有智相以彼決定無有性故然以彼識於外青等諸相而有對礙彼一多伺察有堪任性非真實意而亦非識離勝義諦有所取故彼無性等樂取決定所有智相體性此為能取此為所取此説無彼能取之相以體及業互相樂取決定性故非智相自受中説能取聲亦無智相互相樂取決定自理如是如所生性故彼如是智相自受中而正安立如其所説離能取所取之性此説為無二即智相自受現量成就非一切真實顯示和合若復執彼決定無分位性即無二智相中有所動亂種子隨生不隨智相無二對現所生若執決定無二之相此中還成執著分別非此智相同法之中而得成就是故所有一切義中而成毀謗當知世俗及勝義性決定如是無所有義此中顯明義者如佛所説智即是明世俗即無明若明若無明智如實知別異種類亦無所生是故彼等如實不顛倒相即智明相而為對治當知決定若彼勝義諦中決定無自性者如虛空雲彼非對治以彼所有如理對治真實所行得相應故如熱自性冷物對治此不實義表示無明亦然以如實義説者此無二智自性因中有其多種若此中決定彼世俗相計有性者此不可説於所行中即有二相智實無二問若如前言智即是明世俗即無明者如是所説豈非此中自語相違邪以明自性異世俗有性故答明之無二相即是勝義性此如是説正理成就若世俗所欲領受古師仙人於此語中亦有異義如餘處説此不復引此中如後正理頌言性無性違等所言等者即攝集義非唯如前所説正理離分別智對治散亂此有性無性相違當知彼亦決定對治謂如所有種種性等無性自性離分別智即是對治當知此中若性若相由智力能顯示正義彼復云何勝義諦中無有諸色一性等生若復無所有即種種性定見所言定者是決定義即一性決定以明力故作如是説云何此中作如是説所以頌言説此色唯名真實無自性彼自性分別容受即當止此言唯名等者謂即此般若波羅蜜多中世尊所説此色唯名唯名者此即唯想是故真實勝義諦中有所安立然色蘊相無自性空謂由如是因故即自性分別於此容受所分別者謂堅強性等境界自性是故有此分別增相乃起如是自性分別如是所有自性分別容受多種故此皆止止謂止遣如是等説皆止自性分別散亂此般若波羅蜜多本母中復為前義遣除過失故説頌言色及色自性空如先所説彼自性俱相分別此止遣此言如先説等者説謂言説謂即如先所有彼説何所説邪故上頌言色及色自性此中空故彼如是説遣彼自性俱相分別上言色者即是色之自共二相此自共相及色自性是等皆空於大種等俱相之中起分別增相彼自性俱相分別對治問此與前第三止遣俱相分別行相云何答若前所説俱相分別散亂者彼中色及色自性二俱有故此中止遣俱相者但為止其自共相故行相云何所謂此中堅強性等相差別而有是謂此中俱相故此止遣此亦非唯止遣如是分別餘諸分別散亂亦復止遣復次頌言不生不滅等所有諸法觀佛言若散異彼差別分別此言不生等者謂即如是世尊於般若波羅蜜多中作如是説觀於諸法不生不滅是故如是言若有散異安處此即差別分別若見色等差別生滅之相即此如是色之自性差別分別此中當離是即止遣差別分別散亂此如是説亦復止遣後諸散亂所以頌言虛假名言等彼法若分別聲義二非合彼非自性意此言虛假等者即般若波羅蜜多本母教中和合表示謂虛假名即想分別説如後般若波羅蜜多本母教中和會別別如是法此分別之聲所有語言法句義等彼分別俱相是故聲義二種非自性和合而非世尊最勝意樂亦非他意樂若於分別工巧造作彼復外義取著即諸愚者安立動亂如是所行而非此中有少義可得以外義執著非語義安立開諸愚者動亂之門此中止遣是相所行隨轉即於聲義無少可得以彼如是如名分別不實有故若於所説事相如名分別即非意樂由彼因故此中一切如名如想分別和合不實有彼所説事相故非世尊最勝意樂何以故若如名於義分別即於名義有所增廣於外事中無實能説所説性故如是止遣如名於義分別散亂問何等分別邪答謂名分別彼名亦復無有説者是故頌言般若波羅蜜佛菩薩亦然此所説唯名離實義分別此言般若波羅蜜等者謂名離於義如是名之實義自性分別世尊説言故此止遣何所説邪是故頌言般若波羅蜜佛菩薩亦然此既唯名般若波羅蜜多中何處容説有實自性謂由如來如是言故説名之聲亦無自性此中所有各別表示佛菩薩名當知於無二智中非此止遣此復何因是故頌言所有聲義止此非事止遣如是餘亦知語中義決定此言所有等者謂即所有聲義二種此説止遣頌言此非事止遣者謂無二智不止此中事相作用然彼無言之性不可説故問今所説義是為正理餘處云何頌自答言如是餘亦知如是者謂即如是從初所説是義決定餘謂所餘種類語中亦然了知所謂了知此義決定此中意者謂於般若波羅蜜多中如實宣説不顛倒義成就真實了知一切名性正不可得以此語義施設表示復次頌言此無所得正一切名實知如義性如是不止遣彼聲此言此無所得等者謂如義之性彼無所有不可得故此説為正此何所説邪頌自指言一切名問何人能實知答即一切智實者不顛倒義知謂了知即真實知故頌言不止遣彼聲者謂若聲義二種彼實義性説不可得以是因故不止彼聲謂以聞智所取之聲不可止故如是當知決定最勝意樂悲愍所行悉無障礙如是止遣如義於名分別散亂如是等義真實意樂説已如順有論頌言所有所有一切名彼彼諸法有所説而彼所説非實有即一切法同法性所有彼名名性空能名之名無所有而一切法本無名立以強名而表示一切唯名此當知一切想中假安立彼所聚名差別性當知彼名無所有如尊者須菩提所問般若波羅蜜多中決定止遣聲義二邪故頌釋言須菩提二離聲聲義如是菩薩無有名我見此有説此言須菩提等者謂須菩提了知聲義二種離其安立此中意者聲謂説者之聲聲義謂所説之義云何菩薩無有名以菩薩名無所有不可見故須菩提於般若波羅蜜多中乃有所説此中意者決定二種分別性最勝意樂中遠離虛假聲別異之性此中決定語言向義表示是故頌言般若波羅蜜語無決定生伺察唯智者此義微妙慧此言般若波羅蜜等者無謂無所有即般若波羅蜜多中彼和合語決定無所有無所説無戲論如是應知一切語言中所説決定向義云何是向義謂即如前如所説義彼解釋門頌言伺察唯智者此義微妙慧者伺察者謂細伺審察此義者即三十二品諸有聲中總説決定頌言智者即智者之智能知語義微妙慧者即畢竟微妙清淨之智行相云何謂即此智於一切境界中無著無壞而般若波羅蜜多於響聲中有所聞故為表示此義所以頌言若別義分別相續義除遣般若波羅蜜彼言説如響此言相續義者謂若往若現相續造作之義除遣者棄捨義謂於如是義棄捨執著何以故以般若波羅蜜多若見若聞彼有所説皆如響聲又如金光對現色相以是義故若往若現相續造作有所分別有所執著皆應棄捨由此般若波羅蜜多中一切所説皆如響聲是義總略復次為欲顯明斯義如有頌云所有諸教勿厭捨亦復不應生毀謗見如實已住真實以彼真實而表説今此義中總略所成表示頌言總略如是義般若等依止如是義循環復別義依止此言總略如是等者所有十萬頌般若波羅蜜多總略一切如是等義皆依止此般若波羅蜜多相續三十二品總略攝故如是當知後無增廣頌言如是義循環者謂於如是義一向重復循環研核問研核何等義邪頌自答言別義依止此中所説別義之言即問難別義問謂分別差別問難有所依據謂菩提分法佛功德蘊於此法中如是重復循環研核若如是總略所説所成別義有依據故即三十二品各別自性收攝循環今此所釋八千頌般若波羅蜜多一切文義普盡所釋所生福聚畢竟廣大悉用回向故頌説言般若波羅蜜正攝八千頌彼所得福蘊皆從般若生此言般若波羅蜜正攝八千頌者謂此八千頌般若波羅蜜多中所説自性八千者此之數量普攝如是數量中義總聚已釋頌言正者不顛倒義彼正教中何所生邪頌自答言彼所得福蘊得者獲義如是清淨所成福聚皆從般若波羅蜜多出生以般若波羅蜜多出生故所得福聚甚深廣大以是所得深廣福聚普用回向一切世間悉令獲得般若波羅蜜多畢竟勝妙清淨之智於是無虛妄勝第一義諸正句中如理伺察我此所造解釋之文所生福聚今此説意者普令一切世間悉得清淨頌曰釋迦師子諸苾芻所有如是福高勝此所説意利世間由勝福故住真實
