body:
  text: 三寶尊菩薩造大域龍菩薩造本論西天譯經三藏朝奉大夫試光祿卿傳法大師賜紫沙門臣施護等奉詔譯復説後空如彼頌言彼我等見斷大士畢竟作而彼人無我佛一切處説此言我等見者即説我等見斷我者謂遍計所執所有蘊等等者等攝人及衆生壽者此中行相等謂所等是我所有等釋義應知見者謂取著之見此中總意於我等境界中彼我等見斷斷者壞義作者謂畢竟作故問何人作邪答言菩薩又問若菩薩者何故言大士答大士者即大有情此大有情普遍輪回相續而作此即是菩薩若此中如是復何所説所以頌言而彼人無我佛一切處説謂佛於一切處如是決定説人無我如是等説無性空竟復説後空如彼頌言一切法不生此所説亦然宣説法無我一切處實説此言一切法不生等者一切者普盡義法即是色等法一切即法釋義應知彼一切法悉不生故此言不生者即止其生此中意者即本來不生性非如彼相聚集所得有其實性頌言此所説亦然者此謂如是説者表示義亦然者亦復説故頌言宣説法無我者法謂色等諸法無我即無自性問若爾將何表示頌自答言一切處實説一切處者即遍一切種實謂真實即法無我真如説謂了知了知者遮防為義此説真如遮餘法故又問何人實説邪答謂佛世尊如是等説不同外道所説空故如是等説無性自性空竟復次後説二種空義如彼頌言有罪及無罪不增亦不減諸有為無為所有諸善止此言有罪及無罪等者罪謂過失過隨罪轉故名有罪離罪及過即名無罪若罪無罪所有諸法不增亦不減此言不增者雖有所得而無增長亦不減者謂得無盡法出生無減是故菩薩如實知彼無盡法故所言有為者謂諸有所作故名有為行相云何謂即因緣所生諸行無為者簡非有為行相云何謂擇滅等頌言所有諸善者問而彼有為無為所有諸善復云何説答此中當知有為諸善無為諸善若如次修若不如次修悉得無增減此中意者但於勝義諦中無實取法所言止者止謂止遣止彼所有無相之言如是等説有為空無為空竟復説後空如彼頌言諸善空性中彼出亦無盡此遍計分別彼普攝為空此言諸善空性等者諸善者即諸善法謂空性中有諸善法而非無性何以故頌言彼出亦無盡彼謂於彼聲中含諸善法故出謂出生亦者相續説義此中總意由諸善法如理出生性無盡故彼即無減諸菩薩事亦不間斷頌言此遍計分別者謂智者應當如實了知如是所説遣遍計性頌言彼普攝為空者普謂普盡攝謂總攝謂此八千頌般若經中分別廣説諸空種類此中如是相續所説普遍圓集而總攝故故名普攝如是此中總攝空故問如是空行相此云何和合答此所説空但遣遍計所執法相此如是言即畢竟義於是言中理自和合總集如是所説空已後復無空語義可説復次當知此中如是所説諸空但為止遣有情取著分別非説實性何以故而彼實性中説二種空故所謂人空一切法空如是等説無散空竟問何名無散答散謂離散此散不散故名無散無散體者謂諸菩薩所有善法乃至無餘依涅槃界中彼亦不散彼亦無盡故名無散如是總説十六空竟如辨中邊論慈氏菩薩説如是義顯明開示故彼頌言內外受彼身安住物皆空彼等智如見所有義彼空獲得二種善常利益有情處生死作利彼善法無盡種性等清淨獲得諸相好清淨諸佛法菩薩亦成就人及一切法此中無性空無性中有性彼性亦復空復次此中今説除遣十種分別散亂法當知此即起修行相問何等是彼十種分別散亂復云何止所以頌言十種心散亂心散亂異處愚不得相應無二智不成此言十種心散亂等者謂新發意菩薩等有十種分別散亂所謂無相分別散亂有相分別散亂俱相分別散亂毀謗分別散亂一性分別散亂種種性分別散亂自性分別散亂差別分別散亂如名於義分別散亂如義於名分別散亂此如是等十種分別令心散亂此心心所散亂異處散亂者謂散異動亂故名散亂所言異處者謂別異處有分位等動亂所引是故彼心不得相應問何人不得相應邪頌自答言愚不得相應愚即愚夫異生愚者謂若損若益及真實法悉不知故問不得何法相應頌自答言無二智無二者無有二相名為無二不著二之智名無二智成就者所謂成辦即決定成辦此中如是所有理義如頌所言不成者謂諸愚夫異生心有散亂於彼色聲香味觸等諸境中心生取著是故於彼清淨妙智不得成就即不相應問若無二智不相應者此中復説何義所以頌言彼止息互相為能所對治於般若教中彼圓集所説此言彼止息等者彼者即彼十種分別散亂止息謂止遣問何處止邪頌自答言般若教中謂十萬頌般若波羅蜜多等教中一切皆説如是止言問止彼何法頌自答言互相為能所對治互相者此彼更互義能所對治者謂有相無相互為能所對治行相云何謂如所有有相為能對治即無相為所對治若無相為能對治即有相為所對治此如是等是為行相問彼般若教中當如何説頌自答言彼圓集所説謂此佛母般若波羅蜜多教中如是圓集總聚要略攝此十種分別散亂説謂言説此如是説是即如來如是最上真實了知圓集普攝於佛母般若波羅蜜多中如是宣説問所説云何是故頌言若有菩薩有此無相分別散亂止息師説彼世俗蘊此言菩薩有此無相分別等者菩提及薩埵是即菩提薩埵有謂不無此如是説謂即有此無相分別無相分別者謂色無相分別彼如是散亂即癡所作性問有此散亂其復云何頌答言止息問何人能止邪頌答言師師者謂如來大師善能調伏諸煩惱冤又能救度惡趣等怖故名為師頌言説彼世俗蘊者世俗謂世間其世俗蘊謂色受等説彼蘊者謂令了知有此蘊故除遣無相分別散亂如是所説意者世尊悲愍新發意菩薩等是故為説世俗諸蘊使令了知為除斷見止彼無相分別非説實性此八千頌般若波羅蜜多教中説如是義即諸般若波羅蜜多本母義理相應復次頌言此八千頌等從初語次第至了畢皆止説無相分別此言八千頌等者此者如是義如是八千頌本母所説故等者等攝十萬頌所言從初語次第者即初語所成謂從經初所起語言行相云何如經言須菩提隨汝樂説諸菩薩摩訶薩般若波羅蜜多應當發起如菩薩摩訶薩般若波羅蜜多出生等頌言至了畢皆止者謂從經初乃至經末於中所説悉周竟故頌言皆止者止謂止遣即於其中止彼無相分別毀謗之言頌言説無相分別者謂色無相分別以彼分別色無相故而墮於空以斷有色故所言説者其義云何説謂依法而説此依法説説事相故行相云何謂由初語言而為發起乃至了畢其中所説多種語言於彼言中成立別異發起行相謂諸菩薩及帝釋天主上首等此如是等當知皆是止其斷見問若此等所説語言分位有所發起者復有何等道理依法而説遣除無相分別毀謗之言故頌破言因言不如是此唯説事相梵網等經中知一切如理此云因言不如是等者因者道理義不如是者此道理言非成就言何所以邪頌自釋言此唯説事相事者謂有所作事有所修事説謂言説此中如是義唯説事相故若爾即今和合道理義不成就云何能令諸有智者於中觀察生歡喜邪故頌通言梵網等經中知一切如理此中云何即梵網等所有諸經且言等者等攝雲輪等經彼諸經中皆如理説何人所説謂佛世尊於一切處依如實理自如是説如是説者自義成就所言知者知謂了知了知此説如理如量若如是説真實語義是決定義此復云何若如前言道理説者雖能除遣無相分別彼有相分別旋即生起是故今當如應開示彼相違門如其頌言菩薩我不見而此等廣大世尊此止遣有相分別亂此言菩薩我不見而此等廣大者謂由最初起遍計性於菩薩相而生取著彼所取相於實性中我不可見亦不可得我者己義此等廣大者廣大即包廣義此菩薩者其義廣大是故菩薩我不可見亦不可得般若波羅蜜多亦不可見不可得如是等所説為令止遣有相分別散亂頌言有相分別亂者相謂色等相亂即動亂分別者謂於色等相中有所分別於不如義中取著如義性此如是等疑惑動亂於勝義諦中無有實性問何人止遣邪頌自答言世尊此止遣問何所止邪所以頌言若不見彼名境界行亦然彼蘊一切處皆不見菩薩此言若不見彼名等者若謂若有不見即不可得問何法不見邪答此菩薩名而不可見若説如是名彼説不可得且止此説頌言境界者如實當知非唯菩薩名不可得諸境界等亦不可得境界者謂所行境界是諸菩薩所行般若波羅蜜多如是道相行亦然者行謂普遍諸行即所修所行而此諸行亦不可得所言彼蘊一切處者蘊謂色受等一切處者謂遍一切處及一切種此中意者如實當知以清淨妙慧於是一切處求菩薩相了不可得以是因故菩薩不可見是故頌言皆不見菩薩此中如是所説意者但遣愚者於佛世尊無染智中執有實名及境界等彼不可得非正了知而菩薩相於圓成實性中亦不可捨離若取捨離相者彼無相分別還復生起此義略説故有問言若今如是於實性中無菩薩者豈非前言有相違邪頌自通言此止遣遍計普攝此所説乘一切智因慧分別諸相此言止遣遍計等者遍計者謂諸有情所起顛倒之見行相云何謂於蘊處界中執有實性今止彼故不於清淨妙智中而有所止頌言普攝此所説者此者如是義普攝説者即作者普攝而説此普攝説是勝意樂當知此等般若波羅蜜多義如是普攝而説是為決定即彼如是獲得究竟問以何義故而作此説頌自答言乘一切智因此如是義如理顯示乘謂乘馭一切者普盡義智因者以了別智而為因故問何人乘馭邪頌答言慧慧者大慧即是佛故問何所説邪頌自答言分別諸相相者所謂普集作用故名為相是相無對礙問是何等相頌言分別即分別顯示諸行相故非説實性此如是等所説之義如實觀察乃至無有極微塵量外義自性可得成立是故世尊乘彼智聚開示分別所有一切作用行相問得何義故乃能如是所以頌言般若波羅蜜説三種依止謂遍計依他及圓成實性此言般若波羅蜜等者當知般若波羅蜜多有二種法一者勝上二者所行勝上者謂離煩惱所知二障之智所行者謂名句文言説之相彼勝上者即般若波羅蜜多自性所説彼所行者即説法言義是自性作用問其所作用此中云何頌自答言説三種依止三種依止者此復云何如頌所言謂遍計依他及圓成實性遍計者謂諸愚夫於無二清淨智中遍計諸相執著對礙此説名為遍計性依他性者謂無二智自性安住無明種子二有對礙而彼無明依他起故此即説為依他起性圓成實性者謂即無二之智即是圓成實性問云何説為三種依止所以頌言無此等説句一切遍計止幻喻等見邊此説依他性此言無此等説句一切遍計止等者無謂無所有此句者謂如是等諸所説句等謂等其説法者彼止言無問此中行相其復云何故頌答言一切遍計止一切者即普盡義遍計者謂虛妄巧異執著造作止謂止遣此如是等所説意者謂若有聞一切説者説止遣言智者應當畢竟了知一切皆是止遣遍計有相執著頌言幻喻等見邊此説依他性等者幻謂帝網等者等攝乾闥婆城等諸幻法幻者由他假法有所成故今取彼幻喻此法故乃名幻喻見邊者謂由彼喻曉如是法故名見邊此中意者謂若有聞説幻喻等諸見邊義智者當知此即是説依他起性此中當知由彼幻等已見邊故是故世尊有所宣説問彼依他自性云何了知圓成自性云何説事所以頌言有四種清淨説圓成實性般若波羅蜜佛無別異説此言有四種清淨説圓成實性等者説謂表示謂以四種清淨表示所有圓成自性四種者即有四種類清淨者無染義謂由得彼四種淨故乃名清淨
