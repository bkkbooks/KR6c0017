body:
  text: 三寶尊菩薩造大域龍菩薩造本論西天譯經三藏朝奉大夫試光祿卿傳法大師賜紫沙門臣施護等奉詔譯所言四種清淨者一自性清淨二離垢清淨三所緣清淨四平等清淨初自性清淨者即是無差別無二之智行相云何自性者謂本性不虛假即真我性於自性中有如是相如摩尼寶映現和合如佛所言一切衆生即如來藏彼一切法與善逝等而無自性此如是説即自性清淨二離垢清淨者離垢者即離諸垢染清淨之義已如前釋行相云何謂所行對治諸有觀力隨生相應無二之智此所作已所有世尊增上意樂事等即彼實際真如法界此如是説即離垢清淨三所緣清淨者所緣者謂即所有普盡般若波羅蜜多義等一切所緣境界作用又彼所得性或所成性亦是所緣於是所緣中而得清淨清淨之義已如前釋此如是説即所緣清淨四平等清淨者平等者齊等無差義即是平等微妙清淨法界大法光明彼平等性乃名平等於是平等中而得清淨清淨之義已如前釋此如是説即平等清淨如是總説四種清淨即圓成自性是故説此般若波羅蜜多諸有行相如是言義此如是等和合作已離虛假法所以頌言般若波羅蜜此中云何謂即所有般若波羅蜜多諸有所説言義自性謂佛世尊一切如是當知皆依三種相説非離依他等自性別有所成義此中所説行相云何謂若幻喻等見邊説已即是説彼依他起性而無別異若依他起性説者即是幻喻等見邊何以故無復有法故如是餘處亦然應知復次此中若説止門所有行相即是説彼遍計之性而無別異若遍計性説者即是所説止門何以故此法無故問圓成實性中云何可有彼言説門以彼法中無有性故如是隨其所生分位即彼如是所説分位而亦無實所以頌言十分別散亂對治如次説此三種知已若即若離説此言十分別散亂對治如次説等者謂即所有十種分別散亂今此次第説彼對治即相違對治及能所對治所言三種者謂遍計依他圓成實性如是三種如其次第知已者謂了知已所言若即若離説者謂般若波羅蜜多教中有即有離故此中總意若如是了知已彼遍計依他等所有諸事相或即或離彼一一相如其所説顯明開示問此中云何若即若離説遍計等所以頌言如初語圓成依他及遍計無相分別色彼散亂止遣此言如初語等者如者指法謂此如是八千頌般若教中最初語言如彼經云須菩提隨汝樂説諸菩薩摩訶薩般若波羅蜜多應當發起如菩薩摩訶薩般若波羅蜜多出生等此如是語即最初語此語依彼圓成依他遍計三性而説如所説相即圓成性等自色相非無若於如是自色相中起色無相分別散亂者世尊於此皆悉止遣問復次此義云何了知答如彼最初語中依三種義説所有彼語今於此中略指其義如彼經云如菩薩摩訶薩般若波羅蜜多出生等出者即出離義又出生義或得無上道義以要言之或為種種義界此如是説由此出生一切義故此中復能出生稱讚等事謂佛菩薩等所有稱讚彼稱讚相如前已説又如經言須菩提隨汝樂説諸菩薩摩訶薩般若波羅蜜多應當發起諸境界事所言樂説者謂得樂説慧及得樂説光明故名樂説此如是等一段經文即依他起性所説事相若如彼經從須菩提乃至出生等全段經文其中若有説彼實義即是依彼遍計性説又如經言如菩薩摩訶薩般若波羅蜜多出生等此一段經文即圓成實性所説事相此中總意由此因故依三種義宣説般若波羅蜜多是故所説有即有離復次頌言彼佛亦菩提不見説者等至了畢此知止遣遍計性此言彼者謂即彼因此中云何謂諸愚者於般若波羅蜜多教中取著句義執實能知所知起諸遍計故此止遣問何法能止邪答止法應知問何人是説者頌自答言彼佛亦菩提不見説者等此中云何謂如所應安立句義能覺了者即是佛故菩提者謂離煩惱所知二障之智等即等攝菩薩聲聞所言説者即是佛等謂若有於蘊等自性中顛倒遍計者佛為説彼止遣法故此中如是即有彼説者頌言不見者如理應知問而彼所説何等是其分限頌自答言至了畢謂此般若波羅蜜多教中自初至末而悉周畢是為分限頌言止遣遍計性者謂此所説佛及菩提不見等義皆是止遣有相分別遍計性故問云何此中但止遍計性不止圓成邪頌自通言自性空彼色俱相何所有此別異語中了知已彼止此言自性等者自性者即本性義空彼色者謂色自性空若彼智相見有色故即有所取如是一切計色有實彼為對礙於俱相中而有增相還成分別所分別相其云何有所以頌言俱相何所有俱相者即二俱相謂色自性於勝義諦中無所取分位譬如人角其義應知是故但止遍計不止圓成何以故勝義諦中非有性故頌言此別異語中了知已彼止者此者因義了知者解了義謂由於彼別異語中善了知已即能遠離所言彼止者止謂止遣謂即止彼所有遍計此如是等當知皆是止遣俱相分別散亂後當止遣毀謗分別散亂如彼頌言此不空故空如是語所説諸毀謗分別一切説皆止所言此不空故空等者謂佛世尊於般若波羅蜜多本母中宣説如是不空故空所言如是語所説者謂即説此如是語故所説云何所謂不空故空空性離故所言諸毀謗分別者若有於此不空故空中取空自性者是即毀謗分別今悉止遣所言一切説皆止者一切者謂一切處一切種類説謂言説謂佛世尊不但此中止遣遍計分別於一切處執空之言皆悉止遣復次頌言如幻亦然佛彼如夢亦然如是如次知智語邊決定此言如幻亦然佛彼如夢亦然等者當知此説亦是止遣毀謗分別如幻者以幻喻法故名如幻何者如幻謂即佛故亦然者相續説義如夢亦然者謂即彼佛亦復如夢此中若有説佛之言當知皆是説無二智而彼自性與異生等相續有故但為無明幻等之所覆故而諸愚者乃於自相隱而不現頌言如是如次知智語邊決定者謂如是所説如其次第如理而知知謂了知問何人能知頌答言智智即智者問何等是語邊決定答所謂一切法如幻問此中止遣毀謗分別如是知已後復云何有所開示所以頌言諸同等所作此説佛如幻幻喻等言等此説依他性此言諸同等所作此説佛如幻等者同所作者謂同其幻此中意者若一切處無二智中無所生者彼諸同等所作説不相應何所以邪以諸幻等皆有性故此中如是佛亦有性是故頌言説佛如幻頌言幻喻等言等此説依他性者上言等者等攝夢等復言等者即是因義説謂言説若説幻喻等言即是説彼依他起性此依他性佛所説故依他者謂依屬於他故名依他此依他者即無明自體此等分位有所依止即此如幻説佛亦然是故應知非一切種一切無性以自性清淨故彼等幻喻佛等所説一切皆然如是等説若有毀謗分別者彼非如來藏一切衆生非無二智何以故於一切有中毀謗分別故由如是故於所成義而悉不成亦不和合問若勝義諦中無二之智即是如來者云何此中説異生智邪為破此疑所以頌言若諸異生智彼自性清淨故説彼佛言菩薩亦如佛此言若諸異生智彼自性清淨者即諸異生本性清淨體即自性清淨之智所云説彼佛言者謂説彼佛如實無二智故此説異生智亦復同等問若以所行相中如是説者其復何如頌自答言菩薩亦如佛以無二智所生如是義故是故菩薩亦即如佛由此因故佛及菩薩説無別異問若異生若諸佛於如實智中有所生者云何前言無所得邪頌自通言自性自色覆彼無明因作如幻別異現果如夢棄捨此言自性自色覆彼無明因作者謂諸異生和合自識自性無二由彼無明為因所作起我我所我謂自性我所謂自色以自色覆故別異所現故起二相是相無二亦無有實此復何如頌言如幻於是如幻無自性中取實物性而彼所取與無二智而為對礙問若此無二智自性與異生智自性平等説者何故異生識中無所出現答以能取所取顛倒之性所隱覆故然如來識中於一切時常所出現以清淨性故問若諸異生清淨性中而無有果真實出現者即一切時無明堅著其復云何是故頌文破此疑言果如夢棄捨棄捨者即不取著義此中意者所有自性清淨智中非無果性但為無明所隱覆故如聞思等慧和合所作其所得果而無實義此中亦然如夢中果覺無實義無相可表雖和合而作似有所得得已棄捨此説決定是為正理復次頌言無二別異説果等定毀謗毀謗諸分別彼毀謗此説此言無二別異説等者謂諸愚夫於無二智中別異所現起顛倒見著於二種境界之相頌言果等定毀謗者果等者謂於果等境界真如相中決定毀謗今此止遣頌言毀謗諸分別等者謂毀謗故起諸分別而彼毀謗諸分別等今悉止遣頌言此説者為止遣故今此説言不空故空為令棄捨彼虛假説應知此中色即是空復次此中一性分別有所起現此復云何謂般若波羅蜜多本母中説若色空即非色作此如是和合所説為令止遣一性分別決定語義所以頌言色空非和合彼互相違礙無色無空名色相自和合此言色空非和合者謂色與空不和合故不和合者不相應義問何故不和合頌自答言彼互相違礙謂色空二互相害故相違行相此中云何頌言無色無空名謂若無色即無空以無自性故譬如虛空蓮華其義應知頌言名者即印可義印可此説無自性故頌言色相自和合者謂青黃赤白衆色之相而自和合此中總意彼有自性及無自性應知二種決定相違復次頌言此一性分別對治種種性空不異彼色彼空何所有所言此一性分別等者此者因義由是因故謂即表示對治止遣一性分別是故此般若波羅蜜多教中所説若色空即非色此中如是為令止遣一性分別故所以頌言空不異彼色彼空何所有如上頌言對治種種性者謂即止遣種種性中有所分別是故此般若波羅蜜多本母中作如是説所謂空不異色此如是語云何所作以空礙色故問何所止邪答止遣種種性分別此復何因所謂彼空不異色蘊之相色何所有是故此説色即是空離空無有少色可得以無所有故如是所説悉為止遣種種性分別散亂問此復何因離空無色所以頌言此無實所現彼無明所起此無實能表彼説無明故所言此無實所現等者無實者謂無所有此所出現而為對礙頌言彼無明所起者謂所有色彼色自性有所執著無明所起執著者蓋障義若於如是不實所現中取著有性者是為蓋障是故此中增上意説空不異色問所有諸異生自性清淨智云何彼中説無明言是故頌文破此疑言此無實能表彼説無明故無實者謂不實句義表即表了能謂力能為無實故非所能表此中總意説無明故非勝義諦復次頌言此如是説色般若波羅蜜無二二如是二分別對治所言此如是説色般若波羅蜜等者謂此般若波羅蜜多所説色義即自性清淨智而能遣除能取所取隱覆性故般若中所説者即慧力故問若無明相分別起現彼以何對治頌自答言無二二如是二分別對治此中意者若彼如是二有所現即以勝義相中無二自性清淨之智而為對治即對治彼有性無性二分別相復由聞思修慧和合對治如是對治彼二相已此如是義是即真實如理對治如曠野中見其陽焰妄生水想其義應知此中如是如來最上真實了知故於般若波羅蜜多本母中如實而説復次當知此般若波羅蜜多中所説十種分別散亂皆以無分別智而為對治問若如是者何故總攝但説二種分別對治豈非過失邪答此亦無過謂即如是於此二中而能隱攝亦能止遣餘諸分別是故此意總攝二種又問若此二種已能隱攝餘分別者何故世尊復説多種分別散亂邪答此中意者但為衆生意差別故義自和合且止斯論
